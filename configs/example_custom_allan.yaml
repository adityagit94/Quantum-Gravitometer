output:
  runs_dir: runs
  name: example_custom_allan

bench:
  type: virtual

bench_virtual_ifo:
  wavelength_m: 1.55e-6
  sample_rate_hz: 2000
  duration_s: 5.0
  displacement_sines:
    - amplitude_m: 4.0e-9
      freq_hz: 3.0
      phase_rad: 0.0
    - amplitude_m: 2.0e-9
      freq_hz: 21.0
      phase_rad: 1.2
  measurement_noise_std: 0.03
  amplitude: 1.0
  dc_offset: 0.2
  offset_drift_std_per_s: 0.04
  amplitude_drift_std_per_s: 0.01
  seed: 7

algorithms:
  improved:
    offset_tracking_alpha: 0.003
    phase_smooth_window: 21

stats:
  metrics_backend: custom
  allan_data_type: freq
  psd_method: welch
  welch_nperseg: 512
  welch_noverlap: 256
  compare_allan_backends: true
  comparison_backend: allantools

simulation:
  enabled: false
  backend: aisim
  model: rabi_scan
  n_atoms: 300
  seed: 1
  tau_step_s: 1.0e-6
  n_steps: 30
