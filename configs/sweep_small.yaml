output:
  runs_dir: runs
  name: sweep_small

bench:
  type: virtual

bench_virtual_ifo:
  wavelength_m: 1.55e-6
  sample_rate_hz: 2000
  duration_s: 3.0
  displacement_sines:
    - amplitude_m: 3.0e-9
      freq_hz: 5.0
      phase_rad: 0.0
  measurement_noise_std: 0.05
  amplitude: 1.0
  dc_offset: 0.2
  offset_drift_std_per_s: 0.03
  amplitude_drift_std_per_s: 0.01
  seed: 1

algorithms:
  improved:
    offset_tracking_alpha: 0.02
    phase_smooth_window: 31

stats:
  psd_method: welch
  welch_nperseg: 512
  welch_noverlap: 256
