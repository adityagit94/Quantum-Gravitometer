name: Docs

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Builds the MkDocs site and deploys it to GitHub Pages on every push to main
# (and on manual dispatch). Requires Pages enabled once:
# Settings -> Pages -> Source: "GitHub Actions".

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mkdocs-material
      - name: Build site
        # Not --strict: the docs intentionally cross-reference root files
        # (CHANGELOG.md, README.md) that live outside the mkdocs docs/ tree.
        run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
