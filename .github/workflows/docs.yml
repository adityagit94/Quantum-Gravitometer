name: Docs

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Builds the MkDocs site on every push (a build check). Publishing to GitHub
# Pages runs ONLY on a manual trigger, so a push never shows a red "deploy"
# check when Pages is disabled. To publish the docs site:
#   1. Settings -> Pages -> Source: "GitHub Actions"  (one-time)
#   2. Actions -> Docs -> "Run workflow"
# (To restore auto-publish on push, drop the `if:` on the deploy job below.)

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mkdocs
      - name: Build site
        # Not --strict: the docs intentionally cross-reference root files
        # (CHANGELOG.md, README.md) that live outside the mkdocs docs/ tree.
        run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Manual only: avoids a red check on pushes when Pages isn't enabled.
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
