name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

# JOSS hard pre-review gate: automated tests in CI must run on every PR.
# See docs/research/RESEARCH_JOSS_SUBMISSION.md.

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # Match qgrav's stated requires-python (>=3.9) — sample three versions.
        python: ["3.9", "3.11", "3.12"]
    env:
      MPLBACKEND: Agg  # headless matplotlib for fringe-scan tests
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install qgrav (editable) + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run fast tests
        # `-m "not slow"` deselects the published-reference simulation
        # regressions (which run nightly on the slow workflow).
        run: pytest tests -q -m "not slow"
