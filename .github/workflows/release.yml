name: Release to PyPI

on:
  push:
    tags: ["v*"]

# Publishes to PyPI on every tag matching v*.  Uses PyPI Trusted Publishing
# (no API tokens stored in this repo) — see
# https://docs.pypi.org/trusted-publishers/.  The repo owner must add qgrav as
# a trusted publisher in their PyPI project settings before the first release.

jobs:
  build-and-publish:
    name: Build wheel + sdist and publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password / API token needed when Trusted Publishing is configured.
          attestations: true
